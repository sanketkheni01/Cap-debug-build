name: "publish"

# change this when ready to release if you want CI/CD
on:
  workflow_dispatch:
    inputs:
      interactionId:
        description: "Discord Interaction ID"
        required: false
        type: string

env:
  CN_APPLICATION: cap/cap
  APP_CARGO_TOML: apps/desktop/src-tauri/Cargo.toml
  SENTRY_ORG: cap-s2
  SENTRY_PROJECT: cap-desktop

jobs:
  draft:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read_version.outputs.value }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version number
        uses: SebRollen/toml-action@v1.0.2
        id: read_version
        with:
          file: ${{ env.APP_CARGO_TOML }}
          field: "package.version"


  build:
    needs: draft
    permissions:
      contents: write
      actions: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    runs-on: ${{ matrix.settings.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: ./.github/actions/setup-rust-cache
        with:
          target: ${{ matrix.settings.target }}

      - uses: ./.github/actions/setup-js

      - name: Create .env file in root
        run: |
          echo "appVersion=${{ needs.draft.outputs.version }}" >> .env
          echo "VITE_ENVIRONMENT=production" >> .env
          echo "CAP_DESKTOP_SENTRY_URL=https://6a3b6a09e6ae976c2ad6fff710e88748@o4506859771527168.ingest.us.sentry.io/4508330917101568" >> .env
          echo "NEXT_PUBLIC_WEB_URL=${{ secrets.NEXT_PUBLIC_WEB_URL }}" >> .env
          echo 'NEXTAUTH_URL=${{ secrets.NEXT_PUBLIC_WEB_URL }}' >> .env
          echo 'VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}' >> .env
          echo 'VITE_POSTHOG_HOST=${{ secrets.VITE_POSTHOG_HOST }}' >> .env
          echo 'VITE_SERVER_URL=${{ secrets.NEXT_PUBLIC_WEB_URL }}' >> .env
          echo 'RUST_TARGET_TRIPLE=${{ matrix.settings.target }}' >> .env

      - name: Run cap-setup
        shell: bash
        run: pnpm -w cap-setup
        env:
          RUST_TARGET_TRIPLE: ${{ matrix.settings.target }}

      - name: Build cap-muxer sidecar
        shell: bash
        run: ./scripts/build-cap-muxer.sh ${{ matrix.settings.target }}

      - name: Build app
        working-directory: apps/desktop
        run: pnpm build:tauri --target ${{ matrix.settings.target }} --config src-tauri/tauri.prod.conf.json
        env:
          # https://github.com/tauri-apps/tauri-action/issues/740
          CI: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload production Windows artifacts
        if: ${{ runner.os == 'Windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: cap-production-windows-${{ needs.draft.outputs.version }}
          path: |
            apps/desktop/target/${{ matrix.settings.target }}/release/*.exe
            apps/desktop/target/${{ matrix.settings.target }}/release/*.pdb
            apps/desktop/target/${{ matrix.settings.target }}/release/bundle/nsis/*.exe
            apps/desktop/target/${{ matrix.settings.target }}/release/bundle/nsis/*.sig
            target/${{ matrix.settings.target }}/release/*.exe
            target/${{ matrix.settings.target }}/release/*.pdb
            target/${{ matrix.settings.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.settings.target }}/release/bundle/nsis/*.sig
            apps/desktop/src-tauri/target/${{ matrix.settings.target }}/release/*.exe
            apps/desktop/src-tauri/target/${{ matrix.settings.target }}/release/*.pdb
            apps/desktop/src-tauri/target/${{ matrix.settings.target }}/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/${{ matrix.settings.target }}/release/bundle/nsis/*.sig
          if-no-files-found: error
          retention-days: 14

  done:
    needs: [draft, build]
    runs-on: ubuntu-latest
    steps:
      - name: Done
        run: echo "Production Windows artifact uploaded for ${{ needs.draft.outputs.version }}"
